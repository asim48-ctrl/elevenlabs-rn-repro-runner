name: ElevenLabs React Native iOS repro

on:
  workflow_dispatch:

jobs:
  ios-repro:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Show published package versions
        run: |
          npm ls @elevenlabs/react-native @elevenlabs/client @livekit/react-native livekit-client --depth=0

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Create iOS simulator
        run: |
          set -euxo pipefail
          xcrun simctl list runtimes
          xcrun simctl list devicetypes
          DEVICE_TYPE="$(xcrun simctl list devicetypes | awk -F '[()]' '/iPhone 16 Pro/ { print $2; exit } /iPhone 16/ { print $2; exit } /iPhone 15/ { print $2; exit }')"
          RUNTIME="$(xcrun simctl list runtimes | awk '/^iOS 18/ { runtime=$NF } END { print runtime }')"
          if [ -z "$RUNTIME" ]; then
            RUNTIME="$(xcrun simctl list runtimes | awk '/^iOS / { runtime=$NF } END { print runtime }')"
          fi
          echo "DEVICE_TYPE=${DEVICE_TYPE}"
          echo "RUNTIME=${RUNTIME}"
          UDID="$(xcrun simctl create ElevenLabsRepro "$DEVICE_TYPE" "$RUNTIME")"
          echo "SIM_UDID=${UDID}" >> "$GITHUB_ENV"
          echo "Created simulator ${UDID}"

      - name: Build for iOS Simulator
        run: |
          set -euxo pipefail
          xcodebuild \
            -workspace ios/exporepro.xcworkspace \
            -scheme exporepro \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Start Metro
        run: |
          set -euxo pipefail
          nohup npx expo start --localhost --clear > metro.log 2>&1 &
          echo $! > metro.pid
          sleep 20
          sed -n '1,160p' metro.log

      - name: Boot simulator and launch repro app
        run: |
          set -euxo pipefail
          UDID="${SIM_UDID}"
          echo "Using simulator ${UDID}"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          APP_PATH="$(find build/Build/Products/Debug-iphonesimulator -maxdepth 2 -name '*.app' | head -n 1)"
          echo "Installing ${APP_PATH}"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" com.anonymous.exporepro || true
          sleep 45
          sed -n '1,260p' metro.log || true
          xcrun simctl spawn "$UDID" log show --last 3m --style compact --predicate 'eventMessage CONTAINS "[EL_REPRO]" OR eventMessage CONTAINS "AudioContext" OR eventMessage CONTAINS "navigator.mediaDevices" OR eventMessage CONTAINS "document.createElement" OR eventMessage CONTAINS "window.removeEventListener"' | tee simulator-elevenlabs.log

      - name: Upload repro logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elevenlabs-rn-ios-repro-logs
          path: |
            xcodebuild.log
            metro.log
            simulator-elevenlabs.log
            ios/Podfile.lock
